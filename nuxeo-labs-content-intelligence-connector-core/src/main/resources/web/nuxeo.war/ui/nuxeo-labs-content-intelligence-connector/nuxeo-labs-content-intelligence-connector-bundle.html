<!--
`nuxeo-labs-content-intelligence-connector-bundle.html`

Web UI slot contributions for the Hyland Content Intelligence Connector plugin.
This bundle is appended to the `web-ui` Web Resources bundle by
OSGI-INF/cic-ui-bundle-contrib.xml.

All slot-content names are prefixed with `cic-` to avoid collisions with other bundles.
All i18n keys are namespaced under `label.ui.cic.*` (see the i18n/messages*.json files).
-->

<link rel="import" href="elements/nuxeo-operation-button-with-spinner.html">
<link rel="import" href="elements/kd-ask-question.html">
<link rel="import" href="elements/kd-ask-question-with-selected.html">
<link rel="import" href="elements/kd-conversation.html">
<link rel="import" href="elements/cic-ui-config-page.html">

<!-- ==================== Agents (single-document actions) ==================== -->

<!-- Lookup an agent definition and persist its data on a CICAgenticAgentAndConfig document.
     Calls CIC.AgenticAgentLookup. -->
<nuxeo-slot-content name="cic-agents-lookupAgent" slot="DOCUMENT_ACTIONS" order="1">
  <template>
    <nuxeo-filter document="[[document]]" permission="ReadWrite" type="CICAgenticAgentAndConfig" user="[[user]]">
      <template>
        <nuxeo-operation-button-with-spinner
            event="document-updated"
            icon="icons:announcement"
            input="[[document]]"
            label="label.ui.cic.agents.lookupAgent"
            notification="label.ui.cic.agents.lookupAgent.done"
            operation="CIC.AgenticAgentLookup">
        </nuxeo-operation-button-with-spinner>
      </template>
    </nuxeo-filter>
  </template>
</nuxeo-slot-content>

<!-- ==================== Knowledge Enrichment - Image actions ==================== -->

<!-- Filter expression used by all KE image actions:
     Picture facet, has file:content, not a version, not a proxy. -->

<nuxeo-slot-content name="cic-ke-image-classify" slot="DOCUMENT_ACTIONS" order="2">
  <template>
    <nuxeo-filter document="[[document]]"
                  expression='document.properties !== null &amp;&amp; document.properties["file:content"] !== null &amp;&amp; !document.isVersion &amp;&amp; !document.isProxy'
                  facet="Picture" permission="ReadWrite" user="[[user]]">
      <template>
        <nuxeo-operation-button-with-spinner
            event="document-updated"
            icon="icons:class"
            input="[[document]]"
            label="label.ui.cic.ke.classify"
            notification="label.ui.cic.ke.classify.done"
            params="{&quot;saveDocument&quot;: true}"
            operation="CIC.ClassifyImage">
        </nuxeo-operation-button-with-spinner>
      </template>
    </nuxeo-filter>
  </template>
</nuxeo-slot-content>

<!-- ==================== Knowledge Discovery - Ask question ==================== -->

<!-- Single-document context: open the dialog from the document toolbar. -->
<nuxeo-slot-content name="cic-kd-ask-question" slot="DOCUMENT_ACTIONS" order="1">
  <template>
    <kd-ask-question icon="icons:question-answer"></kd-ask-question>
  </template>
</nuxeo-slot-content>

<!-- Multi-document context: open the dialog from a results selection toolbar. -->
<nuxeo-slot-content name="cic-kd-ask-question-with-selected" slot="RESULTS_SELECTION_ACTIONS" order="1">
  <template>
    <kd-ask-question-with-selected icon="icons:question-answer" selected-items="[[selectedItems]]"></kd-ask-question-with-selected>
  </template>
</nuxeo-slot-content>

<!-- ==================== Knowledge Discovery - Conversation ==================== -->

<!-- Open a multi-turn KD conversation dialog. The agent picker is populated by
     HylandKD.AvailableAgents which queries local CICAgentAndConfig documents
     (only those the current user can READ). -->
<nuxeo-slot-content name="cic-kd-conversation" slot="DOCUMENT_ACTIONS" order="2">
  <template>
    <kd-conversation icon="icons:forum"></kd-conversation>
  </template>
</nuxeo-slot-content>

<!-- ==================== Admin: CIC UI Config helper ==================== -->

<!-- Drawer entry (visible to administrators only). Routes to administration:cic-ui-config. -->
<nuxeo-slot-content name="cicUIConfigMenuItem" slot="ADMINISTRATION_MENU" order="100">
  <template>
    <nuxeo-filter document="[[document]]" expression="user.isAdministrator" user="[[user]]">
      <template>
        <nuxeo-menu-item name="cic-ui-config"
                         label="label.ui.cic.ui-config.menu"
                         route="administration:cic-ui-config">
        </nuxeo-menu-item>
      </template>
    </nuxeo-filter>
  </template>
</nuxeo-slot-content>

<!-- Page registered for the route above. -->
<nuxeo-slot-content name="cicUIConfigPage" slot="ADMINISTRATION_PAGES">
  <template>
    <nuxeo-filter document="[[document]]" expression="user.isAdministrator" user="[[user]]">
      <template>
        <cic-ui-config-page name="cic-ui-config"></cic-ui-config-page>
      </template>
    </nuxeo-filter>
  </template>
</nuxeo-slot-content>
