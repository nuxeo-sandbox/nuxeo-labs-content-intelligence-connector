<!--
`nuxeo-cicagenticagentandconfig-create-layout`
@group Nuxeo UI
@element nuxeo-cicagenticagentandconfig-create-layout
-->
<link rel="import" href="../../elements/cic-agent-selector.html">
<dom-module id="nuxeo-cicagenticagentandconfig-create-layout">
  <template>
    <style include="nuxeo-styles">
      nuxeo-textarea {
        --paper-input-container-input: {
          word-break: normal;
          overflow-wrap: break-word;
          word-wrap: break-word;
        };
      }
    </style>

    <nuxeo-operation id="getContribution"
                     op="HylandContentIntelligence.GetContributionNames"
                     auto response="{{contribs}}"></nuxeo-operation>

    <hr>
    <p style="text-align: center;">[[i18n('label.ui.cicagenticagentandconfig.createInfo')]]</p>
    <hr>

    <label>[[i18n('label.ui.cicagenticagentandconfig.configName')]]</label>
    <div style="display: flex; align-items: center; margin-bottom: 20px;">
      <paper-dropdown-menu style="margin-bottom: 0; margin-top: -10px; margin-right: 15px;" required>
        <paper-listbox slot="dropdown-content"
                       selected="{{document.properties.cicagenticagentandconfig:configName}}"
                       attr-for-selected="value">
          <template is="dom-repeat" items="[[_agentsConfigs(contribs)]]">
            <paper-item value="[[item]]">[[item]]</paper-item>
          </template>
        </paper-listbox>
      </paper-dropdown-menu>

      <div id="info" style="font-size: smaller; display: flex; align-items: center; flex: 1;">
        <span style="margin-right: 8px;">&#9432;</span>
        <span style="text-align: left;">[[i18n('label.ui.cicagenticagentandconfig.configNameHelp')]]</span>
      </div>
    </div>

    <cic-agent-selector agent-type="Agentic"
                        config-name="{{document.properties.cicagenticagentandconfig:configName}}"
                        on-agent-selected="_onAgentSelected">
    </cic-agent-selector>

    <hr style="margin-bottom: 20px">

    <nuxeo-input role="widget" value="{{document.properties.dc:title}}" label="[[i18n('label.dublincore.title')]]" type="text" required="true" name="title"></nuxeo-input>

    <nuxeo-textarea role="widget" value="{{document.properties.dc:description}}" label="[[i18n('label.dublincore.description')]]" type="text" name="description"></nuxeo-textarea>

    <nuxeo-input value="{{document.properties.cicagenticagentandconfig:agentId}}" label="[[i18n('label.ui.cicagenticagentandconfig.agentId')]]" type="text" name="agentId" role="widget" required></nuxeo-input>

  </template>

  <script>
  Polymer({
    is: 'nuxeo-cicagenticagentandconfig-create-layout',
    behaviors: [Nuxeo.LayoutBehavior],
    properties: {

      /**
       * @doctype CICAgenticAgentAndConfig
       */
      document: {
        type: Object,
      },

      contribs: Object,

    },

    _agentsConfigs: function(contribs) {
      return (contribs && contribs.agents) || [];
    },

    _onAgentSelected: function(event) {
      const selectedAgent = event.detail.agent;
      this.set('document.properties.dc:title', selectedAgent.name);
      this.set('document.properties.dc:description', selectedAgent.description);
      this.set('document.properties.cicagenticagentandconfig:agentId', selectedAgent.id);
    }
  });
  </script>
</dom-module>
